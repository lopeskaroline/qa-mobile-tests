image: node:20

stages:
  - test
  - report

variables:
  BROWSERSTACK_USERNAME: $BROWSERSTACK_USERNAME
  BROWSERSTACK_ACCESS_KEY: $BROWSERSTACK_ACCESS_KEY
  BROWSERSTACK_APP_ID: $BROWSERSTACK_APP_ID

cache:
  paths:
    - node_modules/

before_script:
  - npm install

mobile_tests:
  stage: test
  script:
    - npx wdio run wdio.conf.js
  artifacts:
    when: always
    paths:
      - allure-results/
    expire_in: 7 days

allure_report:
  stage: report
  script:
    - npm install -g allure-commandline --save-dev
    - allure generate allure-results --clean -o allure-report
  artifacts:
    when: always
    paths:
      - allure-report/
    expire_in: 7 days
  dependencies:
    - mobile_tests